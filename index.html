<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alberte — Årsplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#fff;--surface2:#F0EDE8;--border:#E2DDD6;--text:#1A1816;--muted:#8A8480;--faint:#C8C4BF;--skole:#2D5A4E;--skole-bg:#EAF2EF;--studie:#5C3D1E;--studie-bg:#F5EDE6;--fritid:#3D3660;--fritid-bg:#EEEDF7;--moede:#7A2D2D;--moede-bg:#F7EAEA;--ferie:#1D6A8C;--ferie-bg:#E5F2F8;--accent:#C4722A;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
.sidebar{background:var(--text);padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:#F7F5F0;line-height:1.2}
.logo span{color:var(--accent);font-style:italic}
.logo-date{font-size:11px;color:#555;margin-top:3px}
.nav-label{font-size:10px;letter-spacing:.1em;color:#444;text-transform:uppercase;font-weight:500;margin-top:4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;font-size:13px;color:#aaa;cursor:pointer;border:none;background:none;text-align:left;width:100%;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#eee}
.nav-btn.active{background:rgba(255,255,255,.11);color:#eee;font-weight:500}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-btns{margin-top:auto;display:flex;flex-direction:column;gap:6px}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:background .15s}
.btn-add:hover{background:#b5631f}
.btn-export{background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:background .15s}
.btn-export:hover{background:#1557b0}
.main{padding:1.75rem 2rem;overflow-y:auto}
.page{display:none}.page.active{display:block}
.title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.1}
.title em{color:var(--accent);font-style:italic}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:1.5rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;text-align:center}
.stat-n{font-family:'DM Serif Display',serif;font-size:26px}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px}
.sec{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1.75rem}
.day{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 7px;min-height:140px}
.day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.day-name{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase}
.day-num{font-family:'DM Serif Display',serif;font-size:19px;margin:2px 0 6px}
.day.today .day-num{color:var(--accent)}
.day-events{display:flex;flex-direction:column;gap:3px}
.ev{font-size:10px;padding:3px 5px;border-radius:5px;cursor:pointer;line-height:1.3}
.ev:hover{opacity:.8}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.month-nav .sec{flex:1;margin-bottom:0}
.arr{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
.arr:hover{background:var(--surface2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-h{background:var(--surface2);padding:6px 7px;font-size:10px;font-weight:500;color:var(--muted);text-align:center;text-transform:uppercase}
.cal-d{background:var(--surface);padding:5px 6px;min-height:68px;cursor:pointer}
.cal-d:hover{background:var(--surface2)}
.cal-d.other{background:#fafaf8}.cal-d.other .cal-dn{color:var(--faint)}
.cal-d.today-d{background:#fffbf7}.cal-d.today-d .cal-dn{color:var(--accent);font-weight:500}
.cal-d.ferie-d{background:#EEF7FB}
.cal-dn{font-size:12px;margin-bottom:3px}
.cal-evs{display:flex;flex-direction:column;gap:2px}
.cal-ev{font-size:9px;padding:2px 4px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.year-tabs{display:flex;gap:6px;margin-bottom:1rem}
.ytab{padding:5px 13px;font-size:12px;border:1px solid var(--border);border-radius:99px;background:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif}
.ytab.active{background:var(--text);color:#F7F5F0;border-color:var(--text)}
.year-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ym{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;min-height:110px}
.ym-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ym-name{font-family:'DM Serif Display',serif;font-size:15px}
.ym-w{font-size:10px;color:var(--faint)}
.ym-items{display:flex;flex-direction:column;gap:3px}
.ym-ev{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 6px;border-radius:5px;cursor:pointer}
.ym-ev:hover{opacity:.8}
.ym-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ym-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ym-tag{font-size:10px;opacity:.6;flex-shrink:0}
.empty{font-size:11px;color:var(--faint);font-style:italic}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r);padding:1.5rem;width:390px;max-width:95vw;transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto}
.modal-bg.open .modal{transform:translateY(0)}
.modal-title{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:1.1rem}
.fl{margin-bottom:11px}
.fl label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--accent)}
.fl textarea{height:56px;resize:vertical}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 11px;border-radius:99px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:1.1rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-c{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted)}
.btn-c:hover{background:var(--surface2)}
.btn-s{padding:7px 16px;border:none;border-radius:8px;background:var(--text);color:#F7F5F0;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500}
.btn-s:hover{background:var(--accent)}
.btn-d{padding:7px 11px;border:1px solid #F7EAEA;border-radius:8px;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--moede);margin-right:auto}
.btn-d:hover{background:var(--moede-bg)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#F7F5F0;padding:8px 16px;border-radius:99px;font-size:12px;z-index:200;opacity:0;transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:750px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:1rem;gap:.75rem}
  .sidebar-btns{flex-direction:row;margin-top:0}
  .btn-add,.btn-export{width:auto;padding:8px 14px}
  .week-grid{grid-template-columns:repeat(4,1fr)}
  .year-grid,.stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div>
    <div class="logo">Alberte<br><span>Årsplan</span></div>
    <div class="logo-date" id="logo-date"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:3px">
    <div class="nav-label">Oversigt</div>
    <button class="nav-btn active" onclick="goTo('dashboard')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <button class="nav-btn" onclick="goTo('aarsplan')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Årsplan
    </button>
    <div class="nav-label">Kategorier</div>
    <button class="nav-btn" onclick="filterCat('skole')"><div class="nav-dot" style="background:var(--skole)"></div>Skole</button>
    <button class="nav-btn" onclick="filterCat('studie')"><div class="nav-dot" style="background:var(--studie)"></div>Læreruddannelsen</button>
    <button class="nav-btn" onclick="filterCat('fritid')"><div class="nav-dot" style="background:var(--fritid)"></div>Fritid</button>
    <button class="nav-btn" onclick="filterCat('moede')"><div class="nav-dot" style="background:var(--moede)"></div>Møder</button>
    <button class="nav-btn" onclick="filterCat('ferie')"><div class="nav-dot" style="background:var(--ferie)"></div>Ferier</button>
  </div>
  <div class="sidebar-btns">
    <button class="btn-add" onclick="openModal()">+ Tilføj</button>
    <button class="btn-export" onclick="doExport()">📅 Eksporter til kalender</button>
  </div>
</aside>

<main class="main">
  <div class="page active" id="page-dashboard">
    <div class="title">God <em>dag,</em> Alberte</div>
    <div class="subtitle" id="sub"></div>
    <div class="stats" id="stats"></div>
    <div class="sec">Denne uge</div>
    <div class="week-grid" id="week-grid"></div>
    <div class="month-nav">
      <div class="sec" style="flex:1;margin-bottom:0" id="month-label"></div>
      <button class="arr" onclick="chMonth(-1)">&#8592;</button>
      <button class="arr" onclick="chMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal"></div>
  </div>
  <div class="page" id="page-aarsplan">
    <div class="title">Årsplan</div>
    <div class="subtitle">Skoleår, studieforløb og Holbæk Kommune ferier</div>
    <div class="year-tabs">
      <button class="ytab active" onclick="switchYTab('2526')">2025–26</button>
      <button class="ytab" onclick="switchYTab('2627')">2026–27</button>
    </div>
    <div class="year-grid" id="year-grid"></div>
  </div>
</main>
</div>

<div class="modal-bg" id="mbg" onclick="closeMbg(event)">
  <div class="modal">
    <div class="modal-title" id="mtitle">Tilføj</div>
    <div class="fl"><label>Kategori</label>
      <div class="chips" id="chips">
        <div class="chip" data-t="skole" onclick="selType('skole')">Skole</div>
        <div class="chip" data-t="studie" onclick="selType('studie')">Studie</div>
        <div class="chip" data-t="fritid" onclick="selType('fritid')">Fritid</div>
        <div class="chip" data-t="moede" onclick="selType('moede')">Møde</div>
      </div>
    </div>
    <div class="fl"><label>Titel</label><input id="f-t" type="text" placeholder="fx Valhalla-forløb, eksamen..."></div>
    <div class="fg">
      <div class="fl"><label>Fra</label><input id="f-s" type="date"></div>
      <div class="fl"><label>Til</label><input id="f-e" type="date"></div>
    </div>
    <div class="fl" id="fl-fag" style="display:none"><label>Fag</label>
      <select id="f-fag">
        <option value="">— vælg —</option>
        <option>Matematik</option><option>Historie</option><option>Kristendomskundskab</option>
        <option>Natur/teknologi</option><option>Idræt</option><option>Dansk</option><option>Engelsk</option>
      </select>
    </div>
    <div class="fl"><label>Note</label><textarea id="f-n" placeholder="Materialer, sted, kontakt..."></textarea></div>
    <div class="mact">
      <button class="btn-d" id="btn-del" style="display:none" onclick="delItem()">Slet</button>
      <button class="btn-c" onclick="closeM()">Annuller</button>
      <button class="btn-s" onclick="saveItem()">Gem</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS={
  skole: {bg:'#EAF2EF',text:'#1E3E36',dot:'#2D5A4E'},
  studie:{bg:'#F5EDE6',text:'#32261C',dot:'#5C3D1E'},
  fritid:{bg:'#EEEDF7',text:'#2A2444',dot:'#3D3660'},
  moede: {bg:'#F7EAEA',text:'#5A2020',dot:'#7A2D2D'},
  ferie: {bg:'#E5F2F8',text:'#124A63',dot:'#1D6A8C'},
};
const DA=['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const MN=['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];
const F26=[
  {titel:'Efterårsferie',start:'2025-10-11',slut:'2025-10-19'},
  {titel:'Juleferie',start:'2025-12-20',slut:'2026-01-04'},
  {titel:'Vinterferie',start:'2026-02-07',slut:'2026-02-15'},
  {titel:'Påskeferie',start:'2026-03-28',slut:'2026-04-06'},
  {titel:'Kr. Himmelfart',start:'2026-05-14',slut:'2026-05-17'},
  {titel:'Pinseferie',start:'2026-05-23',slut:'2026-05-25'},
  {titel:'Grundlovsdag',start:'2026-06-05',slut:'2026-06-05'},
  {titel:'Sommerferie',start:'2026-06-27',slut:'2026-08-10'},
];
const F27=[
  {titel:'Efterårsferie',start:'2026-10-10',slut:'2026-10-18'},
  {titel:'Juleferie',start:'2026-12-19',slut:'2027-01-03'},
  {titel:'Vinterferie',start:'2027-02-13',slut:'2027-02-21'},
  {titel:'Påskeferie',start:'2027-03-20',slut:'2027-03-29'},
  {titel:'Kr. Himmelfart',start:'2027-05-06',slut:'2027-05-09'},
  {titel:'Pinseferie',start:'2027-05-15',slut:'2027-05-17'},
  {titel:'Sommerferie',start:'2027-06-26',slut:'2027-08-09'},
];
const SAAR={
  '2526':[{m:'August',y:2025,mi:7},{m:'September',y:2025,mi:8},{m:'Oktober',y:2025,mi:9},{m:'November',y:2025,mi:10},{m:'December',y:2025,mi:11},{m:'Januar',y:2026,mi:0},{m:'Februar',y:2026,mi:1},{m:'Marts',y:2026,mi:2},{m:'April',y:2026,mi:3},{m:'Maj',y:2026,mi:4},{m:'Juni',y:2026,mi:5}],
  '2627':[{m:'August',y:2026,mi:7},{m:'September',y:2026,mi:8},{m:'Oktober',y:2026,mi:9},{m:'November',y:2026,mi:10},{m:'December',y:2026,mi:11},{m:'Januar',y:2027,mi:0},{m:'Februar',y:2027,mi:1},{m:'Marts',y:2027,mi:2},{m:'April',y:2027,mi:3},{m:'Maj',y:2027,mi:4},{m:'Juni',y:2027,mi:5}],
};

let items=[], nid=1, editId=null, selT='skole', curM=new Date().getMonth(), curY=new Date().getFullYear(), filt=null, ytab='2526';

function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function tod(){const d=new Date();d.setHours(0,0,0,0);return d;}
function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function wn(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);}
function isFerie(date){return[...F26,...F27].some(f=>{const s=pd(f.start),e=pd(f.slut);return s&&date>=s&&date<=e;});}
function ferieItems(){return[...F26,...F27].map((f,i)=>({id:-1000-i,type:'ferie',titel:f.titel,start:f.start,slut:f.slut,fag:'',note:'Holbæk Kommune'}));}
function allItems(){return [...items,...ferieItems()];}
function onDate(date){return allItems().filter(it=>{if(filt&&it.type!==filt)return false;const s=pd(it.start),e=pd(it.slut)||pd(it.start);return s&&date>=s&&date<=e;});}

function load(){
  try{const r=localStorage.getItem('ap-v4');if(r){items=JSON.parse(r);nid=Math.max(0,...items.map(i=>i.id))+1;}else seed();}catch(e){seed();}
}
function save(){try{localStorage.setItem('ap-v4',JSON.stringify(items));}catch(e){}}
function seed(){
  items=[
    {id:1,type:'skole',titel:'Nordiske myter / Valhalla',start:'2025-08-11',slut:'2025-08-29',fag:'Kristendomskundskab',note:'Film + arbejdsark klar'},
    {id:2,type:'skole',titel:'Procent',start:'2025-09-01',slut:'2025-10-03',fag:'Matematik',note:''},
    {id:3,type:'skole',titel:'Anden Verdenskrig',start:'2025-10-20',slut:'2025-12-05',fag:'Historie',note:'Gruppepræsentationer uge 49'},
    {id:4,type:'studie',titel:'Praktik 1',start:'2025-09-15',slut:'2025-10-10',fag:'',note:''},
    {id:5,type:'studie',titel:'Eksamen — didaktik',start:'2026-01-12',slut:'2026-01-12',fag:'',note:''},
    {id:6,type:'fritid',titel:'Molly-tur',start:'2025-08-16',slut:'2025-08-16',fag:'',note:''},
    {id:7,type:'moede',titel:'Teammøde',start:'2025-08-11',slut:'2025-08-11',fag:'',note:'Skolen'},
  ];
  nid=20;save();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function renderAll(){
  const now=tod();
  const days=['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  document.getElementById('logo-date').textContent=days[now.getDay()]+' d. '+now.getDate()+'. '+MN[now.getMonth()].toLowerCase();
  document.getElementById('sub').textContent='Uge '+wn(now)+' · '+MN[now.getMonth()]+' '+now.getFullYear();
  // stats
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n" style="color:var(--accent)">${items.filter(i=>pd(i.start)>=now).length}</div><div class="stat-l">Kommende</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--skole)">${items.filter(i=>i.type==='skole').length}</div><div class="stat-l">Skole</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--studie)">${items.filter(i=>i.type==='studie').length}</div><div class="stat-l">Studie</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--fritid)">${items.filter(i=>i.type==='fritid').length}</div><div class="stat-l">Fritid</div></div>
  `;
  // week
  const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  let wh='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const its=onDate(d);
    wh+=`<div class="day${sd(d,now)?' today':''}">
      <div class="day-name">${DA[i]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-events">${its.length?its.map(it=>{const c=CATS[it.type];return`<div class="ev" style="background:${c.bg};color:${c.text}"${it.id>0?` onclick="editItem(${it.id})"`:''}>${it.titel}</div>`;}).join(''):'<div class="empty">Fri</div>'}</div>
    </div>`;
  }
  document.getElementById('week-grid').innerHTML=wh;
  // month cal
  document.getElementById('month-label').textContent=MN[curM]+' '+curY;
  const first=new Date(curY,curM,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const dim=new Date(curY,curM+1,0).getDate();
  let ch=DA.map(d=>`<div class="cal-h">${d}</div>`).join('');
  let day=1-dow;
  for(let r=0;r<6;r++){
    let rh='';let hc=false;
    for(let c=0;c<7;c++,day++){
      const d=new Date(curY,curM,day);
      const inM=day>=1&&day<=dim;
      if(inM||r<5){
        hc=true;
        const its=onDate(d);
        const iT=sd(d,now);const iF=isFerie(d)&&inM;
        rh+=`<div class="cal-d${!inM?' other':''}${iT?' today-d':''}${iF?' ferie-d':''}" onclick="dayClick('${fd(d)}')">
          <div class="cal-dn">${d.getDate()}</div>
          <div class="cal-evs">${its.slice(0,3).map(it=>{const c=CATS[it.type];return`<div class="cal-ev" style="background:${c.bg};color:${c.text}">${it.titel}</div>`;}).join('')}${its.length>3?`<div style="font-size:9px;color:var(--faint)">+${its.length-3}</div>`:''}</div>
        </div>`;
      }
    }
    if(hc)ch+=rh;
  }
  document.getElementById('cal').innerHTML=ch;
  // year
  const months=SAAR[ytab];const ferier=ytab==='2526'?F26:F27;
  let yh='';
  months.forEach(({m,y,mi})=>{
    const ms=new Date(y,mi,1),me=new Date(y,mi+1,0);
    const seen=new Set();
    const mf=ferier.filter(f=>{const s=pd(f.start),e=pd(f.slut);return s<=me&&e>=ms;}).map(f=>({...f,type:'ferie',id:-1}));
    const mi2=items.filter(it=>{if(seen.has(it.id))return false;const s=pd(it.start),e=pd(it.slut)||pd(it.start);if(!s)return false;if(s<=me&&e>=ms){seen.add(it.id);return true;}return false;});
    const all=[...mf,...mi2].filter(it=>!filt||it.type===filt);
    yh+=`<div class="ym">
      <div class="ym-h"><div class="ym-name">${m} <span style="font-size:11px;color:var(--faint);font-family:'DM Sans',sans-serif">${y}</span></div><div class="ym-w">uge ${wn(ms)}–${wn(me)}</div></div>
      <div class="ym-items">${all.length?all.map(it=>{const c=CATS[it.type];const tag=it.type==='ferie'?'Ferie':it.fag?it.fag.split('/')[0]:it.type;return`<div class="ym-ev" style="background:${c.bg};color:${c.text}"${it.id>0?` onclick="editItem(${it.id})"`:''}><div class="ym-dot" style="background:${c.dot}"></div><div class="ym-label">${it.titel}</div><div class="ym-tag">${tag}</div></div>`;}).join(''):'<div class="empty">Intet planlagt</div>'}</div>
    </div>`;
  });
  document.getElementById('year-grid').innerHTML=yh;
}

function openModal(pre){
  editId=null;
  document.getElementById('mtitle').textContent='Tilføj';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('f-t').value='';
  document.getElementById('f-s').value=pre||fd(tod());
  document.getElementById('f-e').value=pre||fd(tod());
  document.getElementById('f-fag').value='';
  document.getElementById('f-n').value='';
  selType('skole');
  document.getElementById('mbg').classList.add('open');
  setTimeout(()=>document.getElementById('f-t').focus(),200);
}
function editItem(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  editId=id;
  document.getElementById('mtitle').textContent='Rediger';
  document.getElementById('btn-del').style.display='inline-flex';
  document.getElementById('f-t').value=it.titel;
  document.getElementById('f-s').value=it.start;
  document.getElementById('f-e').value=it.slut||it.start;
  document.getElementById('f-fag').value=it.fag||'';
  document.getElementById('f-n').value=it.note||'';
  selType(it.type);
  document.getElementById('mbg').classList.add('open');
}
function selType(t){
  selT=t;
  document.querySelectorAll('.chip').forEach(el=>{
    const c=CATS[el.dataset.t];
    if(el.dataset.t===t){el.style.background=c.bg;el.style.color=c.text;el.style.borderColor=c.dot;}
    else{el.style.background='';el.style.color='var(--muted)';el.style.borderColor='var(--border)';}
  });
  document.getElementById('fl-fag').style.display=t==='skole'?'block':'none';
}
function closeM(){document.getElementById('mbg').classList.remove('open');}
function closeMbg(e){if(e.target.id==='mbg')closeM();}
function saveItem(){
  const t=document.getElementById('f-t').value.trim();
  if(!t){document.getElementById('f-t').focus();return;}
  const s=document.getElementById('f-s').value;
  const e=document.getElementById('f-e').value;
  const obj={id:editId||nid++,type:selT,titel:t,start:s,slut:e||s,fag:document.getElementById('f-fag').value,note:document.getElementById('f-n').value.trim()};
  if(editId){items=items.map(i=>i.id===editId?obj:i);}else{items.push(obj);}
  save();closeM();renderAll();toast(editId?'Gemt ✓':'Tilføjet ✓');
}
function delItem(){
  if(!confirm('Slet?'))return;
  items=items.filter(i=>i.id!==editId);
  save();closeM();renderAll();toast('Slettet');
}
function dayClick(ds){openModal(ds);}
function chMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}renderAll();}
function goTo(p){
  filt=null;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-btn')[p==='dashboard'?0:1].classList.add('active');
  renderAll();
}
function filterCat(t){filt=filt===t?null:t;renderAll();}
function switchYTab(t){ytab=t;document.querySelectorAll('.ytab').forEach((el,i)=>el.classList.toggle('active',['2526','2627'][i]===t));renderAll();}

function doExport(){
  try{
    const all=[...items,...ferieItems()];
    const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Alberte//DA','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
    function icsD(s){return String(s||'').replace(/-/g,'');}
    function icsDE(s){if(!s)return'';const p=s.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+1);return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
    function san(s){return String(s||'').replace(/\r?\n/g,' ').replace(/,/g,'\\,');}
    const lbl={skole:'Skole',studie:'Studie',fritid:'Fritid',moede:'Moede',ferie:'Ferie'};
    all.forEach(function(it){
      if(!it||!it.start)return;
      lines.push('BEGIN:VEVENT');
      lines.push('UID:ap-'+String(it.id)+'@alberte');
      lines.push('DTSTART;VALUE=DATE:'+icsD(it.start));
      lines.push('DTEND;VALUE=DATE:'+icsDE(it.slut||it.start));
      lines.push('SUMMARY:['+lbl[it.type]+'] '+san(it.titel));
      lines.push('END:VEVENT');
    });
    lines.push('END:VCALENDAR');
    const txt=lines.join('\r\n');
    const a=document.createElement('a');
    a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(txt);
    a.download='alberte-aarsplan.ics';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('Kalender hentet! Åbn filen og importer i Google Kalender ✓');
  }catch(err){alert('Fejl: '+err.message);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openModal();}});
load();
curM=new Date().getMonth();curY=new Date().getFullYear();
renderAll();
</script>
