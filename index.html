<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alberte — Årsplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --text: #1A1816;
  --text-muted: #8A8480;
  --text-faint: #B8B4AF;

  --skole: #2D5A4E;
  --skole-light: #EAF2EF;
  --skole-mid: #7AAF9F;

  --studie: #4A3728;
  --studie-light: #F5EDE6;
  --studie-mid: #B8906E;

  --fritid: #3D3660;
  --fritid-light: #EEEDF7;
  --fritid-mid: #9B95CC;

  --moede: #7A2D2D;
  --moede-light: #F7EAEA;
  --moede-mid: #C47A7A;

  --accent: #C4722A;
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--text);
  color: #F7F5F0;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-name {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: #F7F5F0;
  line-height: 1.2;
}
.sidebar-name span { color: var(--accent); font-style: italic; }
.sidebar-date { font-size: 12px; color: #8A8480; margin-top: 4px; }

.nav { display: flex; flex-direction: column; gap: 4px; }
.nav-label { font-size: 10px; letter-spacing: 0.12em; color: #555250; text-transform: uppercase; font-weight: 500; margin-bottom: 4px; margin-top: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  font-size: 14px; color: #B8B4AF; cursor: pointer;
  transition: all 0.15s; border: none; background: none; text-align: left; width: 100%;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #F7F5F0; }
.nav-item.active { background: rgba(255,255,255,0.1); color: #F7F5F0; font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.sidebar-bottom { margin-top: auto; }
.add-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
}
.add-btn:hover { background: #B5631F; }
.add-btn svg { width: 16px; height: 16px; }

/* ── MAIN ── */
.main { padding: 2rem 2.5rem; overflow-y: auto; }

.page { display: none; }
.page.active { display: block; }

/* ── DASHBOARD ── */
.dash-header { margin-bottom: 2rem; }
.dash-title { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1.1; }
.dash-title em { color: var(--accent); font-style: italic; }
.dash-sub { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

/* UGE */
.section-label {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; color: var(--text-muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 2.5rem;
}
.day-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  min-height: 160px;
  transition: box-shadow 0.15s;
}
.day-col:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.day-col.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.day-name { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.day-num { font-family: 'DM Serif Display', serif; font-size: 22px; margin: 2px 0 8px; }
.day-col.today .day-num { color: var(--accent); }
.day-events { display: flex; flex-direction: column; gap: 4px; }
.day-event {
  font-size: 11px; padding: 4px 7px; border-radius: 6px;
  font-weight: 400; line-height: 1.3; cursor: pointer;
  transition: opacity 0.1s;
}
.day-event:hover { opacity: 0.8; }

/* MÅNED */
.month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.month-nav-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
.nav-arrow {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text-muted); transition: all 0.1s;
}
.nav-arrow:hover { background: var(--surface2); color: var(--text); }

.month-grid-cal {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.cal-header { background: var(--surface2); padding: 8px 10px; font-size: 11px; font-weight: 500; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 0.06em; }
.cal-day {
  background: var(--surface); padding: 8px 10px; min-height: 80px;
  cursor: pointer; transition: background 0.1s; position: relative;
}
.cal-day:hover { background: var(--surface2); }
.cal-day.other-month { background: #FAFAF8; }
.cal-day.other-month .cal-day-num { color: var(--text-faint); }
.cal-day.today-cal { background: #FFFBF7; }
.cal-day.today-cal .cal-day-num { color: var(--accent); font-weight: 500; }
.cal-day-num { font-size: 13px; margin-bottom: 4px; }
.cal-events { display: flex; flex-direction: column; gap: 2px; }
.cal-event { font-size: 10px; padding: 2px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ÅRSPLAN */
.year-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.year-month {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem; min-height: 130px;
}
.year-month-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.year-month-name { font-family: 'DM Serif Display', serif; font-size: 17px; }
.year-month-weeks { font-size: 11px; color: var(--text-faint); }
.year-items { display: flex; flex-direction: column; gap: 4px; }
.year-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
}
.year-item:hover { opacity: 0.8; }
.year-item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.year-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.year-item-tag { font-size: 10px; opacity: 0.7; flex-shrink: 0; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1rem; text-align: center;
}
.stat-n { font-family: 'DM Serif Display', serif; font-size: 32px; }
.stat-l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 2rem; width: 420px; max-width: 95vw;
  transform: translateY(12px); transition: transform 0.2s;
  max-height: 90vh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 1.5rem; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; letter-spacing: 0.04em; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; padding: 9px 12px; font-size: 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-row textarea { height: 70px; resize: vertical; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); transition: all 0.15s; }
.btn-cancel:hover { background: var(--surface2); color: var(--text); }
.btn-save { padding: 9px 20px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #F7F5F0; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.15s; }
.btn-save:hover { background: var(--accent); }
.btn-delete { padding: 9px 14px; border: 1px solid #F7EAEA; border-radius: var(--radius-sm); background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--moede); margin-right: auto; transition: all 0.15s; }
.btn-delete:hover { background: var(--moede-light); }

/* TYPE CHIPS */
.type-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.type-chip {
  padding: 6px 14px; border-radius: 99px; font-size: 13px; cursor: pointer;
  border: 1.5px solid transparent; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.type-chip.selected { font-weight: 500; }

/* EMPTY STATE */
.empty { font-size: 12px; color: var(--text-faint); font-style: italic; padding: 4px 0; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--text); color: #F7F5F0; padding: 10px 20px; border-radius: 99px;
  font-size: 13px; z-index: 200; opacity: 0; transition: all 0.25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; }
  .week-grid { grid-template-columns: repeat(4, 1fr); }
  .year-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div>
    <div class="sidebar-name">Alberte<br><span>Årsplan</span></div>
    <div class="sidebar-date" id="sidebar-date"></div>
  </div>

  <nav class="nav">
    <div class="nav-label">Oversigt</div>
    <button class="nav-item active" onclick="goTo('dashboard')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="goTo('aarsplan')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Årsplan
    </button>

    <div class="nav-label">Kategorier</div>
    <button class="nav-item" onclick="filterView('skole')">
      <div class="nav-dot" style="background:var(--skole)"></div> Skole
    </button>
    <button class="nav-item" onclick="filterView('studie')">
      <div class="nav-dot" style="background:var(--studie)"></div> Læreruddannelse
    </button>
    <button class="nav-item" onclick="filterView('fritid')">
      <div class="nav-dot" style="background:var(--fritid)"></div> Fritid
    </button>
    <button class="nav-item" onclick="filterView('moede')">
      <div class="nav-dot" style="background:var(--moede)"></div> Møder
    </button>
  </nav>

  <div class="sidebar-bottom">
    <button class="add-btn" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tilføj
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="dash-header">
      <div class="dash-title">God <em>morgen,</em> Alberte</div>
      <div class="dash-sub" id="dash-sub"></div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="section-label">Denne uge</div>
    <div class="week-grid" id="week-grid"></div>

    <div class="month-nav">
      <div class="section-label" style="flex:1;margin-bottom:0" id="month-label-dash"></div>
      <button class="nav-arrow" onclick="changeMonth(-1)">&#8592;</button>
      <button class="nav-arrow" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="month-grid-cal" id="month-cal"></div>
  </div>

  <!-- ÅRSPLAN -->
  <div class="page" id="page-aarsplan">
    <div class="dash-header">
      <div class="dash-title">Årsplan <em>2025–26</em></div>
      <div class="dash-sub">Skoleår, studieforløb og vigtige datoer</div>
    </div>
    <div class="year-grid" id="year-grid"></div>
  </div>

</main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Tilføj</div>

    <div class="form-row">
      <label>Kategori</label>
      <div class="type-chips" id="type-chips">
        <div class="type-chip selected" data-type="skole" style="background:var(--skole-light);color:var(--skole);border-color:var(--skole)" onclick="selectType('skole')">Skole</div>
        <div class="type-chip" data-type="studie" style="border-color:var(--border)" onclick="selectType('studie')">Studie</div>
        <div class="type-chip" data-type="fritid" style="border-color:var(--border)" onclick="selectType('fritid')">Fritid</div>
        <div class="type-chip" data-type="moede" style="border-color:var(--border)" onclick="selectType('moede')">Møde</div>
      </div>
    </div>

    <div class="form-row">
      <label>Titel</label>
      <input type="text" id="f-titel" placeholder="fx Valhalla-forløb, eksamen, Molly-tur...">
    </div>

    <div class="form-grid">
      <div class="form-row">
        <label>Startdato</label>
        <input type="date" id="f-start">
      </div>
      <div class="form-row">
        <label>Slutdato</label>
        <input type="date" id="f-slut">
      </div>
    </div>

    <div class="form-row" id="row-fag" style="display:none">
      <label>Fag (valgfri)</label>
      <select id="f-fag">
        <option value="">— vælg fag —</option>
        <option>Matematik</option>
        <option>Historie</option>
        <option>Kristendomskundskab</option>
        <option>Natur/teknologi</option>
        <option>Idræt</option>
        <option>Dansk</option>
        <option>Engelsk</option>
      </select>
    </div>

    <div class="form-row">
      <label>Note</label>
      <textarea id="f-note" placeholder="Materialer, sted, kontakt..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteItem()">Slet</button>
      <button class="btn-cancel" onclick="closeModal()">Annuller</button>
      <button class="btn-save" onclick="saveItem()">Gem</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  skole:  { label: 'Skole',   bg: '#EAF2EF', text: '#2D5A4E', dot: '#2D5A4E', mid: '#7AAF9F' },
  studie: { label: 'Studie',  bg: '#F5EDE6', text: '#4A3728', dot: '#4A3728', mid: '#B8906E' },
  fritid: { label: 'Fritid',  bg: '#EEEDF7', text: '#3D3660', dot: '#3D3660', mid: '#9B95CC' },
  moede:  { label: 'Møde',    bg: '#F7EAEA', text: '#7A2D2D', dot: '#7A2D2D', mid: '#C47A7A' },
};

const SKOLEAAR_MONTHS = [
  {m:'August',    y:2025, mi:7},
  {m:'September', y:2025, mi:8},
  {m:'Oktober',   y:2025, mi:9},
  {m:'November',  y:2025, mi:10},
  {m:'December',  y:2025, mi:11},
  {m:'Januar',    y:2026, mi:0},
  {m:'Februar',   y:2026, mi:1},
  {m:'Marts',     y:2026, mi:2},
  {m:'April',     y:2026, mi:3},
  {m:'Maj',       y:2026, mi:4},
  {m:'Juni',      y:2026, mi:5},
];

const DAYS_DA = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const MONTHS_DA = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];

let items = JSON.parse(localStorage.getItem('alberte-items') || 'null') || [
  {id:1, type:'skole', titel:'Nordiske myter / Valhalla', start:'2025-08-04', slut:'2025-08-29', fag:'Kristendomskundskab', note:'Film + arbejdsark klar'},
  {id:2, type:'skole', titel:'Procent', start:'2025-09-01', slut:'2025-10-03', fag:'Matematik', note:''},
  {id:3, type:'skole', titel:'Anden Verdenskrig', start:'2025-10-06', slut:'2025-12-05', fag:'Historie', note:'Gruppepræsentationer uge 49'},
  {id:4, type:'skole', titel:'Naturcenter-tur', start:'2025-09-19', slut:'2025-09-19', fag:'', note:'Husk tilladelsessedler'},
  {id:5, type:'studie', titel:'Praktik 1', start:'2025-09-15', slut:'2025-10-10', fag:'', note:''},
  {id:6, type:'studie', titel:'Eksamen — didaktik', start:'2026-01-12', slut:'2026-01-12', fag:'', note:''},
  {id:7, type:'fritid', titel:'Efterårsferie', start:'2025-10-13', slut:'2025-10-17', fag:'', note:''},
  {id:8, type:'fritid', titel:'Juleferie', start:'2025-12-22', slut:'2026-01-02', fag:'', note:''},
  {id:9, type:'moede', titel:'Teammøde', start:'2025-08-11', slut:'2025-08-11', fag:'', note:'Skolen'},
];
let nextId = Math.max(...items.map(i=>i.id)) + 1;
let editingId = null;
let selectedType = 'skole';
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let activeFilter = null;

function save() { localStorage.setItem('alberte-items', JSON.stringify(items)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── DATES ──
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s) { if (!s) return null; const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function itemsOnDate(date) {
  return items.filter(it => {
    const s = parseDate(it.start), e = parseDate(it.slut);
    if (!s) return false;
    const end = e || s;
    return date >= s && date <= end;
  });
}

function weekNumber(d) {
  const date = new Date(d); date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay()+6)%7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay()+6)%7) / 7);
}

// ── SIDEBAR DATE ──
function updateSidebarDate() {
  const d = new Date();
  const days = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  document.getElementById('sidebar-date').textContent = `${days[d.getDay()]} d. ${d.getDate()}. ${MONTHS_DA[d.getMonth()].toLowerCase()}`;
  document.getElementById('dash-sub').textContent = `Uge ${weekNumber(d)} — ${MONTHS_DA[d.getMonth()]} ${d.getFullYear()}`;
}

// ── STATS ──
function renderStats() {
  const now = today();
  const upcoming = items.filter(it => parseDate(it.start) >= now).length;
  const skole = items.filter(it => it.type === 'skole').length;
  const studie = items.filter(it => it.type === 'studie').length;
  const fritid = items.filter(it => it.type === 'fritid').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-n" style="color:var(--accent)">${upcoming}</div><div class="stat-l">Kommende</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--skole)">${skole}</div><div class="stat-l">Skole</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--studie)">${studie}</div><div class="stat-l">Studie</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--fritid)">${fritid}</div><div class="stat-l">Fritid</div></div>
  `;
}

// ── WEEK GRID ──
function renderWeek() {
  const now = today();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const isToday = sameDay(d, now);
    const dayItems = itemsOnDate(d).filter(it => !activeFilter || it.type === activeFilter);
    html += `<div class="day-col${isToday ? ' today' : ''}">
      <div class="day-name">${DAYS_DA[i]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-events">
        ${dayItems.length ? dayItems.map(it => {
          const c = CATS[it.type];
          return `<div class="day-event" style="background:${c.bg};color:${c.text}" onclick="editItem(${it.id})" title="${it.note||''}">${it.titel}</div>`;
        }).join('') : '<div class="empty">Fri</div>'}
      </div>
    </div>`;
  }
  document.getElementById('week-grid').innerHTML = html;
}

// ── MONTH CALENDAR ──
function renderMonthCal() {
  const label = `${MONTHS_DA[currentMonth]} ${currentYear}`;
  document.getElementById('month-label-dash').textContent = label;

  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay(); // 0=sun
  startDow = startDow === 0 ? 6 : startDow - 1; // make monday=0

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const now = today();

  let html = DAYS_DA.map(d => `<div class="cal-header">${d}</div>`).join('');

  let day = 1 - startDow;
  for (let row = 0; row < 6; row++) {
    let hasContent = false;
    let rowHtml = '';
    for (let col = 0; col < 7; col++, day++) {
      const d = new Date(currentYear, currentMonth, day);
      const inMonth = day >= 1 && day <= daysInMonth;
      if (inMonth || row < 5) {
        hasContent = true;
        const isToday = sameDay(d, now);
        const dayItems = itemsOnDate(d).filter(it => !activeFilter || it.type === activeFilter);
        rowHtml += `<div class="cal-day${!inMonth ? ' other-month' : ''}${isToday ? ' today-cal' : ''}" onclick="dayClick('${fmtDate(d)}')">
          <div class="cal-day-num">${d.getDate()}</div>
          <div class="cal-events">
            ${dayItems.slice(0,3).map(it => {
              const c = CATS[it.type];
              return `<div class="cal-event" style="background:${c.bg};color:${c.text}">${it.titel}</div>`;
            }).join('')}
            ${dayItems.length > 3 ? `<div style="font-size:10px;color:var(--text-faint)">+${dayItems.length-3} mere</div>` : ''}
          </div>
        </div>`;
      }
    }
    if (hasContent) html += rowHtml;
  }
  document.getElementById('month-cal').innerHTML = html;
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderMonthCal();
}

function dayClick(dateStr) {
  openModal();
  document.getElementById('f-start').value = dateStr;
  document.getElementById('f-slut').value = dateStr;
}

// ── ÅRSPLAN ──
function renderYearGrid() {
  let html = '';
  SKOLEAAR_MONTHS.forEach(({m, y, mi}) => {
    const monthStart = new Date(y, mi, 1);
    const monthEnd = new Date(y, mi + 1, 0);
    const seen = new Set();
    const monthItems = items.filter(it => {
      const s = parseDate(it.start), e = parseDate(it.slut) || parseDate(it.start);
      if (!s) return false;
      if (seen.has(it.id)) return false;
      if (s <= monthEnd && e >= monthStart) { seen.add(it.id); return true; }
      return false;
    }).filter(it => !activeFilter || it.type === activeFilter);

    const w1 = weekNumber(monthStart);
    const w2 = weekNumber(monthEnd);

    html += `<div class="year-month">
      <div class="year-month-header">
        <div class="year-month-name">${m} <span style="font-size:13px;color:var(--text-faint);font-family:'DM Sans',sans-serif">${y}</span></div>
        <div class="year-month-weeks">uge ${w1}–${w2}</div>
      </div>
      <div class="year-items">
        ${monthItems.length ? monthItems.map(it => {
          const c = CATS[it.type];
          const tag = it.fag ? it.fag.split('/')[0] : CATS[it.type].label;
          return `<div class="year-item" style="background:${c.bg};color:${c.text}" onclick="editItem(${it.id})">
            <div class="year-item-dot" style="background:${c.dot}"></div>
            <div class="year-item-label">${it.titel}</div>
            <div class="year-item-tag">${tag}</div>
          </div>`;
        }).join('') : '<div class="empty">Intet planlagt</div>'}
      </div>
    </div>`;
  });
  document.getElementById('year-grid').innerHTML = html;
}

// ── MODAL ──
function openModal(prefillDate) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Tilføj';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('f-titel').value = '';
  document.getElementById('f-start').value = prefillDate || fmtDate(today());
  document.getElementById('f-slut').value = prefillDate || fmtDate(today());
  document.getElementById('f-fag').value = '';
  document.getElementById('f-note').value = '';
  selectType('skole');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-titel').focus(), 200);
}

function editItem(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Rediger';
  document.getElementById('btn-delete').style.display = 'inline-flex';
  document.getElementById('f-titel').value = it.titel;
  document.getElementById('f-start').value = it.start;
  document.getElementById('f-slut').value = it.slut || it.start;
  document.getElementById('f-fag').value = it.fag || '';
  document.getElementById('f-note').value = it.note || '';
  selectType(it.type);
  document.getElementById('modal-overlay').classList.add('open');
}

function selectType(t) {
  selectedType = t;
  document.querySelectorAll('.type-chip').forEach(el => {
    const c = CATS[el.dataset.type];
    if (el.dataset.type === t) {
      el.classList.add('selected');
      el.style.background = c.bg; el.style.color = c.text; el.style.borderColor = c.dot;
    } else {
      el.classList.remove('selected');
      el.style.background = ''; el.style.color = 'var(--text-muted)'; el.style.borderColor = 'var(--border)';
    }
  });
  document.getElementById('row-fag').style.display = t === 'skole' ? 'block' : 'none';
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function saveItem() {
  const titel = document.getElementById('f-titel').value.trim();
  if (!titel) { document.getElementById('f-titel').focus(); return; }
  const start = document.getElementById('f-start').value;
  const slut  = document.getElementById('f-slut').value;
  const obj = {
    id: editingId || nextId++,
    type: selectedType,
    titel,
    start,
    slut: slut || start,
    fag: document.getElementById('f-fag').value,
    note: document.getElementById('f-note').value.trim(),
  };
  if (editingId) { items = items.map(i => i.id === editingId ? obj : i); }
  else { items.push(obj); }
  save(); closeModal(); render();
  toast(editingId ? 'Gemt ✓' : 'Tilføjet ✓');
}

function deleteItem() {
  if (!confirm('Slet dette punkt?')) return;
  items = items.filter(i => i.id !== editingId);
  save(); closeModal(); render();
  toast('Slettet');
}

// ── NAV ──
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = page === 'dashboard' ? 0 : 1;
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
  activeFilter = null;
  render();
}

function filterView(type) {
  activeFilter = activeFilter === type ? null : type;
  document.querySelectorAll('.nav-item').forEach((n,i) => {
    if (i > 1) n.classList.toggle('active', n.getAttribute('onclick').includes(type) && activeFilter === type);
  });
  render();
}

// ── RENDER ──
function render() {
  updateSidebarDate();
  renderStats();
  renderWeek();
  renderMonthCal();
  renderYearGrid();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
});

// Init
currentMonth = new Date().getMonth();
currentYear = new Date().getFullYear();
render();
</script>
</body>
</html>
